{% extends "base.html" %}

{% block title %}Produtos | FinderBit Estoque{% endblock %}
{% block page_title %}Produtos{% endblock %}

{% block content %}
<!-- Cabeçalho -->
<header class="page-header">
    <div class="page-header__info">
        <p class="page-header__label">Catálogo</p>
        <h1 class="page-header__title">Produtos</h1>
    </div>
    <div class="page-header__actions">
        <a href="{% url 'inventory:stock-list' %}" class="btn-ghost">
            Ver Estoque
        </a>
        <button type="button" class="btn-brand" data-bs-toggle="modal" data-bs-target="#modalProduct">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/>
            </svg>
            Novo Produto
        </button>
    </div>
</header>

<!-- Filtros -->
<div class="filter-bar mb-4" hx-boost="true" hx-target="#products-table" hx-swap="innerHTML show:top">
    <p class="filter-bar__title">Buscar e filtrar produtos</p>
    <form id="productFilterForm" hx-get="{% url 'inventory:product-list' %}" 
          hx-trigger="keyup changed delay:500ms from:#id_q, change from:#id_category, change from:#id_active, change from:#id_stock_status"
          hx-target="#products-table"
          hx-swap="innerHTML"
          hx-indicator=".htmx-indicator">
        <div class="row g-3">
            <div class="col-md-6 col-lg-3">
                <label for="id_q" class="form-label-custom">Buscar</label>
                <input type="text" id="id_q" name="q" value="{{ filters.q }}" class="form-control-custom" placeholder="Nome, SKU ou categoria...">
            </div>
            <div class="col-md-4 col-lg-2">
                <label for="id_category" class="form-label-custom">Categoria</label>
                <select id="id_category" name="category" class="form-select-custom">
                    <option value="">Todas</option>
                    {% for category in categories %}
                    <option value="{{ category.pk }}" {% if filters.category == category.pk|stringformat:'s' %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4 col-lg-2">
                <label for="id_active" class="form-label-custom">Status</label>
                <select id="id_active" name="active" class="form-select-custom">
                    <option value="">Todos</option>
                    <option value="true" {% if filters.active == 'true' %}selected{% endif %}>Ativos</option>
                    <option value="false" {% if filters.active == 'false' %}selected{% endif %}>Inativos</option>
                </select>
            </div>
            <div class="col-md-4 col-lg-2">
                <label for="id_stock_status" class="form-label-custom">Saldo</label>
                <select id="id_stock_status" name="stock_status" class="form-select-custom">
                    <option value="">Todos</option>
                    <option value="normal" {% if filters.stock_status == 'normal' %}selected{% endif %}>Normal</option>
                    <option value="low" {% if filters.stock_status == 'low' %}selected{% endif %}>Baixo</option>
                </select>
            </div>
            <div class="col-12 col-lg-3">
                <label class="form-label-custom">&nbsp;</label>
                <div class="filter-bar__actions">
                    <button type="button" class="btn filter-bar__btn filter-bar__btn--clear" onclick="document.getElementById('productFilterForm').reset(); document.getElementById('productFilterForm').dispatchEvent(new Event('change'));">
                        Limpar
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<!-- Tabela -->
<div id="products-table-wrapper">
    {% include "inventory/partials/products_table.html" %}
</div>

<!-- Modal de Produto -->
<div class="modal" id="modalProduct" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" id="modalProductContent">
            <div hx-get="{% url 'inventory:product-create' %}" hx-trigger="revealed" hx-swap="innerHTML">
                <div class="d-flex justify-content-center p-4">
                    <div class="spinner-border text-brand" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
