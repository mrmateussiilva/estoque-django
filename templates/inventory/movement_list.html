{% extends "base.html" %}

{% block title %}Movimentações | FinderBit Estoque{% endblock %}
{% block page_title %}Histórico{% endblock %}

{% block content %}
<!-- Cabeçalho -->
<header class="page-header">
    <div class="page-header__info">
        <p class="page-header__label">Rastreabilidade</p>
        <h1 class="page-header__title">Movimentações</h1>
    </div>
    <div class="page-header__actions">
        <button type="button" class="btn-brand" data-bs-toggle="modal" data-bs-target="#modalMovement">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/>
            </svg>
            Nova Movimentação
        </button>
    </div>
</header>

<!-- Filtros -->
<div class="filter-bar mb-4">
    <p class="filter-bar__title">Filtrar movimentações</p>
    <form id="movementFilterForm" hx-get="{% url 'inventory:movement-list' %}" 
          hx-trigger="keyup changed delay:500ms from:#id_product, change from:#id_type, change from:#id_start_date, change from:#id_end_date"
          hx-target="#movements-table"
          hx-swap="innerHTML"
          hx-indicator=".htmx-indicator">
        <div class="row g-3">
            <div class="col-md-4 col-lg-3">
                <label for="id_product" class="form-label-custom">Produto</label>
                <select id="id_product" name="product" class="form-select-custom">
                    <option value="">Todos</option>
                    {% for product in products %}
                    <option value="{{ product.pk }}">{{ product.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4 col-lg-2">
                <label for="id_type" class="form-label-custom">Tipo</label>
                <select id="id_type" name="type" class="form-select-custom">
                    <option value="">Todos</option>
                    <option value="in">Entrada</option>
                    <option value="out">Saída</option>
                </select>
            </div>
            <div class="col-md-4 col-lg-2">
                <label for="id_start_date" class="form-label-custom">Data Inicial</label>
                <input type="date" id="id_start_date" name="start_date" class="form-control-custom">
            </div>
            <div class="col-md-4 col-lg-2">
                <label for="id_end_date" class="form-label-custom">Data Final</label>
                <input type="date" id="id_end_date" name="end_date" class="form-control-custom">
            </div>
            <div class="col-12 col-lg-3">
                <label class="form-label-custom">&nbsp;</label>
                <div class="filter-bar__actions">
                    <button type="button" class="btn filter-bar__btn filter-bar__btn--clear" onclick="document.getElementById('movementFilterForm').reset(); document.getElementById('movementFilterForm').dispatchEvent(new Event('change'));">
                        Limpar
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<!-- Tabela -->
<div id="movements-table-wrapper">
    {% include "inventory/partials/movements_table.html" %}
</div>

<!-- Modal de Movimentação -->
<div class="modal" id="modalMovement" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" id="modalMovementContent">
            <div hx-get="{% url 'inventory:movement-create' %}" hx-trigger="revealed" hx-swap="innerHTML">
                <div class="d-flex justify-content-center p-4">
                    <div class="spinner-border text-brand" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
