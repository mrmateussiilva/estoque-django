{% extends "base.html" %}

{% block title %}Estoque atual | FinderBit Estoque{% endblock %}
{% block page_title %}Estoque{% endblock %}

{% block content %}
<!-- Cabeçalho -->
<header class="page-header">
    <div class="page-header__info">
        <p class="page-header__label">Saldo em tempo real</p>
        <h1 class="page-header__title">Estoque atual</h1>
    </div>
    <div class="page-header__actions">
        <button type="button" class="btn-brand" data-bs-toggle="modal" data-bs-target="#modalMovement">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/>
            </svg>
            Nova Movimentação
        </button>
    </div>
</header>

<!-- Filtros -->
<div class="filter-bar mb-4">
    <p class="filter-bar__title">Buscar e filtrar estoque</p>
    <form hx-get="{% url 'inventory:stock-list' %}" hx-target="#stock-table" hx-push-url="true" hx-trigger="keyup changed delay:300ms from:input, change from:select" class="row g-3">
        <div class="col-md-6 col-lg-4">
            <label class="form-label-custom">Buscar</label>
            <input type="text" name="q" value="{{ filters.q }}" class="form-control-custom" placeholder="Nome, SKU ou categoria...">
        </div>
        <div class="col-md-4 col-lg-2">
            <label class="form-label-custom">Categoria</label>
            <select name="category" class="form-select-custom">
                <option value="">Todas</option>
                {% for category in categories %}
                <option value="{{ category.pk }}" {% if filters.category == category.pk|stringformat:'s' %}selected{% endif %}>
                    {{ category.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4 col-lg-2">
            <label class="form-label-custom">Saldo</label>
            <select name="stock_status" class="form-select-custom">
                <option value="">Todos</option>
                <option value="normal" {% if filters.stock_status == 'normal' %}selected{% endif %}>Normal</option>
                <option value="low" {% if filters.stock_status == 'low' %}selected{% endif %}>Baixo</option>
            </select>
        </div>
        <div class="col-md-4 col-lg-2">
            <label class="form-label-custom">Ordenar por</label>
            <select name="ordering" class="form-select-custom">
                <option value="name" {% if filters.ordering == 'name' %}selected{% endif %}>Nome</option>
                <option value="sku" {% if filters.ordering == 'sku' %}selected{% endif %}>SKU</option>
                <option value="stock_desc" {% if filters.ordering == 'stock_desc' %}selected{% endif %}>Maior saldo</option>
                <option value="stock_asc" {% if filters.ordering == 'stock_asc' %}selected{% endif %}>Menor saldo</option>
            </select>
        </div>
        <div class="col-12 col-lg-2">
            <label class="form-label-custom">&nbsp;</label>
            <div class="filter-bar__actions">
                <a href="{% url 'inventory:stock-export' %}{% querystring %}" class="btn filter-bar__btn filter-bar__btn--clear">
                    Exportar
                </a>
            </div>
        </div>
    </form>
</div>

<!-- Tabela -->
<div id="stock-table">
    {% include "inventory/partials/stock_table.html" %}
</div>
{% endblock %}
