{% if messages %}
    <div class="mb-3">
        {% for message in messages %}
            <div class="alert {% if message.tags == 'success' %}alert-success{% elif message.tags == 'error' %}alert-danger{% else %}alert-secondary{% endif %} mb-2" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
