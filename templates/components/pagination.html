{% if page_obj.has_other_pages %}
    <div class="mt-6 flex items-center justify-between rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm">
        <span class="text-slate-500">Pagina {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
        <div class="flex gap-2">
            {% if page_obj.has_previous %}
                <a href="{% querystring page=page_obj.previous_page_number %}" class="rounded-xl border border-slate-200 px-3 py-2 hover:bg-slate-50">Anterior</a>
            {% endif %}
            {% if page_obj.has_next %}
                <a href="{% querystring page=page_obj.next_page_number %}" class="rounded-xl border border-slate-200 px-3 py-2 hover:bg-slate-50">Proxima</a>
            {% endif %}
        </div>
    </div>
{% endif %}
