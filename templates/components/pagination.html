{% if page_obj.has_other_pages %}
<nav aria-label="Paginação" class="pagination-custom mt-4">
    <div class="pagination-custom__info">
        <span>Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
    </div>
    <div class="pagination-custom__actions">
        {% if page_obj.has_previous %}
            <a href="{% querystring page=page_obj.previous_page_number %}" class="btn btn-outline-secondary btn-sm">Anterior</a>
        {% endif %}
        {% if page_obj.has_next %}
            <a href="{% querystring page=page_obj.next_page_number %}" class="btn btn-outline-secondary btn-sm">Próxima</a>
        {% endif %}
    </div>
</nav>
{% endif %}
