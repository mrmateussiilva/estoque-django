{% if page_obj.has_other_pages %}
<nav aria-label="Paginacao" class="mt-3">
    <ul class="pagination justify-content-between align-items-center mb-0">
        <li class="page-item disabled"><span class="page-link">Pagina {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span></li>
        <li class="d-flex gap-2">
            {% if page_obj.has_previous %}
                <a href="{% querystring page=page_obj.previous_page_number %}" class="btn btn-outline-secondary btn-sm">Anterior</a>
            {% endif %}
            {% if page_obj.has_next %}
                <a href="{% querystring page=page_obj.next_page_number %}" class="btn btn-outline-secondary btn-sm">Proxima</a>
            {% endif %}
        </li>
    </ul>
</nav>
{% endif %}
