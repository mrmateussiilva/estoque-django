services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finderbit-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    environment:
      - HOST=${HOST:-0.0.0.0}

volumes:
  staticfiles:
  media: