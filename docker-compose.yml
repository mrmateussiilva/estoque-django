services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finderbit-web
    restart: always
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PYTHONUNBUFFERED=1
    command: gunicorn config.asgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120

volumes:
  staticfiles:
  media: